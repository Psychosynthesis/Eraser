<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<link rel="stylesheet" href="panelMenu.css"/>
</head>
<body>
	<div class="mainContainer">
		<div class="mainHeader">UTM Eraser</div>
		<div class="eraserCustomRadio-container">
			<div class="eraserCustomRadio" id="eraserCustomRadioItem">
				<div class="eraserCustomRadio-off-title">Off</div>
				<div class="eraserCustomRadio-state-marker no-select"><div class="eraserCustomRadio-punkt">&nbsp;</div></div>
				<div class="eraserCustomRadio-on-title">On</div>
			</div>
		</div>
		<hr />
		<div class="params-container">
			<div class="domain-scope-switch-container">
				<div class="domain-scope-title" id="eraserOnlyForDomainLabel">Only for this domain</div>
				<div class="eraserCustomRadio" id="eraserDomainScopeSwitch">
					<div class="eraserCustomRadio-off-title">All</div>
					<div class="eraserCustomRadio-state-marker no-select"><div class="eraserCustomRadio-punkt">&nbsp;</div></div>
					<div class="eraserCustomRadio-on-title">Site</div>
				</div>
			</div>
			<label id="eraserParamsScopeLabel">UTM's to remove (separated by ,)</label> <br /><br />
			<textarea id="eraserParamsToRemoveList"></textarea>
			<button id="eraserSaveParamsBtn">Save</button>
		</div>
	</div>
	<script src="panelMenu.js" type="module"></script>
</body>
</html>
